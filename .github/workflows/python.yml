name: Build Legendary

on:
  push:
    tags:
      - '*'
  workflow_dispatch:
  pull_request:
    branches: [ '*' ]

jobs:
  build:
    permissions:
      contents: write
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [
          'ubuntu-22.04',
          'windows-latest',
          'macos-14'
        ]
      fail-fast: false
      max-parallel: 3

    steps:
    - uses: actions/checkout@v5

    - uses: actions/setup-python@v6
      with:
        python-version: '3.12'

    - name: Install dependencies and build tools
      run: pip3 install --upgrade
        setuptools
        pyinstaller
        requests
        requests_futures
        filelock

    - name: Install optional dependencies (WebView)
      run: pip3 install --upgrade pywebview
      if: runner.os != 'macOS'

    - name: Set strip option on non-Windows
      id: strip
      if: runner.os != 'Windows'
      run: echo "option=--strip" >> $GITHUB_OUTPUT

    - name: Build
      working-directory: legendary
      run: |
        OS_NAME="$(echo "$RUNNER_OS" | tr '[:upper:]' '[:lower:]')"
        ARCH_RAW="$(uname -m 2>/dev/null || echo "$RUNNER_ARCH")"
        ARCH_NAME="$(echo "$ARCH_RAW" | tr '[:upper:]' '[:lower:]')"
        pyinstaller \
        --onefile \
        --name legendary_${OS_NAME}_${ARCH_NAME} \
        ${{ steps.strip.outputs.option }} \
        -i ../assets/windows_icon.ico
        cli.py
      env:
        PYTHONOPTIMIZE: 1

    - uses: actions/upload-artifact@v4
      with:
        name: legendary-${{ matrix.os }}
        path: legendary/dist/*
  
  release:
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    steps:
      - uses: actions/checkout@v4

      - name: Download all build artifacts
        uses: actions/download-artifact@v7
        with:
          path: dist
          
      - name: Prepare files for release
        run: |
          mkdir -p release_files
          find dist -type f -exec cp {} release_files/ \;
          echo "Files prepared for release:"
          ls -lh release_files

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          files: release_files/*
