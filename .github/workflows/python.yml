name: Build Legendary

on:
  push:
    tags:
      - '*'
  workflow_dispatch:
  pull_request:
    branches: [ '*' ]

jobs:
  pyinstaller:
    permissions:
      contents: write
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [
          'ubuntu-22.04', 'ubuntu-22.04-arm',
          'windows-latest', 'windows-11-arm',
          'macos-14'
        ]
      fail-fast: false
      max-parallel: 3

    steps:
    - uses: actions/checkout@v5

    - uses: actions/setup-python@v6
      with:
        python-version: '3.12'

    - name: Install dependencies and build tools
      run: pip3 install --upgrade
        setuptools
        pyinstaller
        requests
        requests_futures
        filelock

    - name: Install optional dependencies (WebView)
      run: pip3 install --upgrade pywebview
      if: runner.os != 'macOS'

    - name: Set strip option on non-Windows
      id: strip
      if: runner.os != 'Windows'
      run: echo "option=--strip" >> $GITHUB_OUTPUT

    - name: Build
      working-directory: legendary
      run: pyinstaller
        --onefile
        --name legendary
        ${{ steps.strip.outputs.option }}
        -i ../assets/windows_icon.ico
        cli.py
      env:
        PYTHONOPTIMIZE: 1

    - uses: actions/upload-artifact@v4
      with:
        name: ${{ matrix.os }}-package
        path: legendary/dist/*

    # - name: Upload binaries to release
    #   if: startsWith(github.ref, 'refs/tags/')
